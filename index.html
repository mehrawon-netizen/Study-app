<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزیدنت‌یار | مدیریت یک‌ساله آزمون تخصص</title>
<style>
:root{
  --navy:#0b1f3a;
  --navy-light:#13294b;
  --navy-lighter:#1c3a63;
  --med-green:#0e8a6d;
  --med-green-light:#12b58c;
  --white:#f7f9fb;
  --red:#e2626b;
  --gold:#d4af37;
  --gray:#8a95a5;
  --card-bg:#ffffff;
  --shadow: 0 4px 16px rgba(11,31,58,0.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Vazirmatn','Tahoma',sans-serif;
  background:linear-gradient(180deg,#eef2f7,#e4ebf2);
  color:var(--navy);
  min-height:100vh;
}
#app{ display:flex; min-height:100vh; }

/* ---------- Sidebar ---------- */
#sidebar{
  width:230px;
  background:linear-gradient(180deg,var(--navy),var(--navy-light));
  color:var(--white);
  display:flex; flex-direction:column;
  padding:20px 12px;
  position:sticky; top:0; height:100vh;
  flex-shrink:0;
}
#sidebar .logo{
  display:flex; align-items:center; gap:8px;
  font-weight:bold; font-size:18px;
  padding:10px 8px 20px 8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  margin-bottom:14px;
}
#sidebar .logo .pulse{
  width:12px; height:12px; border-radius:50%;
  background:var(--med-green-light);
  box-shadow:0 0 0 0 rgba(18,181,140,.7);
  animation:pulse 1.6s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(18,181,140,.6);}
  70%{box-shadow:0 0 0 10px rgba(18,181,140,0);}
  100%{box-shadow:0 0 0 0 rgba(18,181,140,0);}
}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:11px 12px; border-radius:10px;
  cursor:pointer; font-size:14px;
  color:rgba(255,255,255,0.75);
  transition:.2s;
  margin-bottom:2px;
}
.nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
.nav-item.active{
  background:var(--med-green);
  color:#fff;
  font-weight:bold;
}
.nav-item .icon{ font-size:17px; width:20px; text-align:center; }
#sidebar .footer-info{
  margin-top:auto; font-size:11px; color:rgba(255,255,255,0.4);
  padding:10px 8px;
  border-top:1px solid rgba(255,255,255,0.08);
}

/* ---------- Main ---------- */
#main{ flex:1; padding:22px 26px; max-width:1200px; margin:0 auto; width:100%; }
.page{ display:none; animation:fadeIn .25s ease; }
.page.active{ display:block; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

.page-title{
  font-size:22px; font-weight:bold; margin-bottom:4px;
  display:flex; align-items:center; gap:8px;
}
.page-sub{ color:var(--gray); font-size:13px; margin-bottom:20px; }

.grid{ display:grid; gap:16px; }
.grid-2{ grid-template-columns:1fr 1fr; }
.grid-3{ grid-template-columns:1fr 1fr 1fr; }
.grid-4{ grid-template-columns:repeat(4,1fr); }
@media(max-width:900px){
  .grid-2,.grid-3,.grid-4{ grid-template-columns:1fr 1fr; }
  #sidebar{ width:70px; }
  #sidebar .label{ display:none; }
  #sidebar .logo span.text{ display:none; }
}
@media(max-width:600px){
  .grid-2,.grid-3,.grid-4{ grid-template-columns:1fr; }
}

.card{
  background:var(--card-bg);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
  border:1px solid rgba(11,31,58,0.05);
}
.card-title{
  font-size:14px; font-weight:bold; color:var(--navy);
  margin-bottom:12px; display:flex; align-items:center; gap:6px;
}
.card-title .dot{ width:8px; height:8px; border-radius:50%; background:var(--med-green); }

.stat-card{
  background:linear-gradient(135deg, var(--navy), var(--navy-lighter));
  color:#fff; border-radius:16px; padding:18px;
  position:relative; overflow:hidden;
}
.stat-card .num{ font-size:26px; font-weight:bold; }
.stat-card .lbl{ font-size:12px; opacity:.8; margin-top:4px; }
.stat-card.green{ background:linear-gradient(135deg, var(--med-green), #0a6650); }
.stat-card.gold{ background:linear-gradient(135deg,#b8912e, #8f6f1f); }
.stat-card.red{ background:linear-gradient(135deg,#c74650,#8f2a32); }

.btn{
  background:var(--med-green); color:#fff; border:none;
  padding:10px 18px; border-radius:10px; cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:bold;
  transition:.2s;
}
.btn:hover{ background:var(--med-green-light); }
.btn.secondary{ background:var(--navy-light); }
.btn.danger{ background:var(--red); }
.btn.outline{ background:transparent; border:1px solid var(--med-green); color:var(--med-green); }
.btn.small{ padding:6px 12px; font-size:12px; }
.btn:disabled{ opacity:.5; cursor:not-allowed; }

label{ font-size:12px; color:var(--navy); font-weight:bold; display:block; margin-bottom:5px; margin-top:12px; }
input, select, textarea{
  width:100%; padding:9px 10px; border-radius:8px;
  border:1px solid #d5dce5; font-family:inherit; font-size:13px;
  background:#fbfcfe;
}
input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--med-green); }
textarea{ resize:vertical; min-height:60px; }

.range-row{ display:flex; align-items:center; gap:10px; }
.range-row input[type=range]{ flex:1; }
.range-val{ font-weight:bold; color:var(--med-green); min-width:24px; text-align:center; }

.pill{
  display:inline-block; padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:bold;
}
.pill.green{ background:#e3f7f1; color:var(--med-green); }
.pill.red{ background:#fce9ea; color:var(--red); }
.pill.gold{ background:#faf3dd; color:#8f6f1f; }
.pill.gray{ background:#eef1f5; color:var(--gray); }

table{ width:100%; border-collapse:collapse; font-size:13px; }
th, td{ padding:9px 8px; text-align:right; border-bottom:1px solid #eef1f5; }
th{ color:var(--gray); font-weight:bold; font-size:12px; }
tr:hover td{ background:#fafcfe; }

.progress-bar{ height:8px; background:#eef1f5; border-radius:6px; overflow:hidden; }
.progress-bar .fill{ height:100%; background:var(--med-green); border-radius:6px; transition:.4s; }
.progress-bar .fill.gold{ background:var(--gold); }
.progress-bar .fill.red{ background:var(--red); }

.badge-item{
  display:flex; align-items:center; gap:10px;
  padding:12px; border-radius:12px; background:#fafcfe;
  border:1px solid #eef1f5;
}
.badge-item.locked{ opacity:.4; filter:grayscale(1); }
.badge-icon{
  width:42px; height:42px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--gold),#8f6f1f);
  font-size:20px; flex-shrink:0;
}
.toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:var(--navy); color:#fff; padding:12px 22px; border-radius:12px;
  font-size:13px; box-shadow:var(--shadow); z-index:999;
  opacity:0; pointer-events:none; transition:.3s;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-8px); }

.motiv-box{
  background:linear-gradient(135deg,var(--med-green),#0a6650);
  color:#fff; padding:16px 18px; border-radius:14px; font-size:13px;
  line-height:1.9; margin-bottom:16px;
}
.modal-overlay{
  position:fixed; inset:0; background:rgba(11,31,58,0.5);
  display:none; align-items:center; justify-content:center; z-index:1000;
}
.modal-overlay.show{ display:flex; }
.modal-box{
  background:#fff; border-radius:16px; padding:20px; width:90%; max-width:420px;
  max-height:85vh; overflow:auto;
}
.tabs{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.tab-btn{
  padding:8px 14px; border-radius:8px; background:#eef1f5; cursor:pointer;
  font-size:12px; font-weight:bold; color:var(--navy);
}
.tab-btn.active{ background:var(--navy); color:#fff; }
.hr{ height:1px; background:#eef1f5; margin:14px 0; }
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
.small-text{ font-size:12px; color:var(--gray); }
.level-badge{
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(255,255,255,0.15); padding:4px 12px; border-radius:20px;
  font-size:12px; margin-top:6px;
}
#toastContainer{ position:fixed; bottom:0; left:0; right:0; z-index:999; }
.close-x{ cursor:pointer; font-size:18px; color:var(--gray); }
.checkbox-row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
.checkbox-row input{ width:auto; }
.empty-state{ text-align:center; padding:30px; color:var(--gray); font-size:13px; }
canvas{ max-width:100%; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo"><span class="pulse"></span><span class="text">🩺 رزیدنت‌یار</span></div>
    <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span><span class="label">داشبورد</span></div>
    <div class="nav-item" data-page="addStudy"><span class="icon">📖</span><span class="label">ثبت مطالعه</span></div>
    <div class="nav-item" data-page="addTest"><span class="icon">📝</span><span class="label">ثبت تست</span></div>
    <div class="nav-item" data-page="planner"><span class="icon">🗓️</span><span class="label">برنامه‌ریز</span></div>
    <div class="nav-item" data-page="reviews"><span class="icon">🔄</span><span class="label">مرورها</span></div>
    <div class="nav-item" data-page="mistakes"><span class="icon">❌</span><span class="label">دفترچه غلط‌ها</span></div>
    <div class="nav-item" data-page="analytics"><span class="icon">📈</span><span class="label">تحلیل</span></div>
    <div class="nav-item" data-page="gamify"><span class="icon">🏆</span><span class="label">سطح و نشان‌ها</span></div>
    <div class="nav-item" data-page="wellness"><span class="icon">💤</span><span class="label">سلامت و انرژی</span></div>
    <div class="nav-item" data-page="motivation"><span class="icon">🔥</span><span class="label">انگیزشی</span></div>
    <div class="nav-item" data-page="settings"><span class="icon">⚙️</span><span class="label">تنظیمات</span></div>
    <div class="footer-info label">رزیدنت‌یار v1.0<br>ساخته‌شده برای آزمون تخصص</div>
  </div>

  <div id="main">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard"></div>
    <!-- ADD STUDY -->
    <div class="page" id="page-addStudy"></div>
    <!-- ADD TEST -->
    <div class="page" id="page-addTest"></div>
    <!-- PLANNER -->
    <div class="page" id="page-planner"></div>
    <!-- REVIEWS -->
    <div class="page" id="page-reviews"></div>
    <!-- MISTAKES -->
    <div class="page" id="page-mistakes"></div>
    <!-- ANALYTICS -->
    <div class="page" id="page-analytics"></div>
    <!-- GAMIFY -->
    <div class="page" id="page-gamify"></div>
    <!-- WELLNESS -->
    <div class="page" id="page-wellness"></div>
    <!-- MOTIVATION -->
    <div class="page" id="page-motivation"></div>
    <!-- SETTINGS -->
    <div class="page" id="page-settings"></div>
  </div>
</div>

<div id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
/* ================== CONSTANTS ================== */
const ACTIVITY_WEIGHTS = {
  "تحلیل تست": 1.5,
  "تست آموزشی": 1.4,
  "تست زمان‌دار": 1.4,
  "مطالعه مفهومی": 1.2,
  "خلاصه‌نویسی": 1.1,
  "ویدیو": 0.9,
  "مرور": 1.0,
  "مرور منفعل": 0.6
};

const MISTAKE_REASONS = ["بلد نبودم","بی‌دقتی","شک","کمبود زمان","اشتباه مفهومی","فراموشی"];
const TEST_TYPES = ["آموزشی","زمان‌دار","آزمون جامع","شبیه‌ساز"];
const ACTIVITY_TYPES = Object.keys(ACTIVITY_WEIGHTS);

const REVIEW_SCHEDULE = [
  {days:1,  type:"مرور نکات",              n:1},
  {days:3,  type:"تست آموزشی",             n:2},
  {days:7,  type:"بازیابی فعال بدون نگاه",  n:3},
  {days:14, type:"تست زمان‌دار",            n:4},
  {days:30, type:"مرور خلاصه",             n:5},
  {days:60, type:"آزمون ترکیبی",           n:6}
];

const LEVELS = [
  {name:"Intern", min:0},
  {name:"Junior Resident", min:500},
  {name:"Senior Resident", min:1500},
  {name:"Chief Resident", min:3500},
  {name:"Attending", min:7000},
  {name:"Consultant", min:12000},
  {name:"Master Clinician", min:20000}
];

const BADGE_DEFS = [
  {id:"iron_heart", title:"قلب آهنی", desc:"۷ روز مطالعه پشت‌سرهم", icon:"❤️",
    check: d => d.maxStreak >= 7},
  {id:"test_master", title:"استاد تست", desc:"۱۰۰۰ تست حل‌شده", icon:"🎯",
    check: d => d.totalTests >= 1000},
  {id:"comeback", title:"احیاگر روز خراب", desc:"جبران عقب‌افتادگی", icon:"🔋",
    check: d => d.comebackCount >= 1},
  {id:"error_hunter", title:"شکارچی خطا", desc:"۱۰۰ نکته در دفترچه غلط‌ها", icon:"🔍",
    check: d => d.totalMistakes >= 100},
  {id:"night_resident", title:"رزیدنت شب‌زنده‌دار", desc:"عملکرد خوب بعد از روز سخت", icon:"🌙",
    check: d => d.nightSaveCount >= 1},
  {id:"review_specialist", title:"متخصص مرور", desc:"۳۰ مرور موفق", icon:"🔄",
    check: d => d.completedReviews >= 30}
];

const PHASES = [
  {name:"فاز ۱: پایه‌سازی", minDays:270, ratio:{study:0.7, test:0.2, review:0.1}},
  {name:"فاز ۲: تثبیت و تست", minDays:180, ratio:{study:0.4, test:0.4, review:0.2}},
  {name:"فاز ۳: جمع‌بندی پیشرفته", minDays:60, ratio:{study:0.2, test:0.5, review:0.3}},
  {name:"فاز ۴: فاز نهایی", minDays:0, ratio:{study:0.1, test:0.5, review:0.4}}
];

const MOTIV_MESSAGES = {
  ahead: ["تو امروز از دیروزت جلو زدی. همین‌طور ادامه بده.", "یک قدم جلوتر از دیروز، یک قدم نزدیک‌تر به قبولی."],
  behind: ["برای شکست دیروز فقط چند دقیقه بیشتر لازم است.", "هنوز وقت هست جبران کنی. یک بلوک دیگه بزن."],
  streak: ["استریک تو داره هویتت رو می‌سازه. رزیدنتی که هر روز کار می‌کنه.", "پشتکار تو الان بخشی از شخصیتته."],
  examClose: ["نزدیک آزمون: تست و مرور، نه مطالعه جدید.", "این روزها هر تست، یک قدم به سمت قبولیه."],
  general: ["هیچ روزی صفر نیست. حتی ۲۰ دقیقه ارزش دارد.", "یک صفحه بیشتر → یک تصمیم بالینی بهتر.", "تو امروز فقط باید از دیروزت جلو بزنی."]
};

/* ================== DEFAULT SUBJECTS ================== */
const DEFAULT_SUBJECTS = [
  {id:"s1", name:"داخلی", weight:1, priority:"بالا", color:"#0e8a6d"},
  {id:"s2", name:"جراحی", weight:1, priority:"بالا", color:"#1c3a63"},
  {id:"s3", name:"اطفال", weight:0.8, priority:"متوسط", color:"#d4af37"},
  {id:"s4", name:"زنان", weight:0.8, priority:"متوسط", color:"#e2626b"},
  {id:"s5", name:"روانپزشکی", weight:0.6, priority:"پایین", color:"#8a95a5"}
];

/* ================== STORAGE ================== */
const DB_KEY = "residentAppDB_v1";

function defaultDB(){
  return {
    user:{
      name:"کاربر",
      examDate: null, // ISO date string
      targetDailyHours: 6,
      createdAt: todayStr()
    },
    subjects: JSON.parse(JSON.stringify(DEFAULT_SUBJECTS)),
    topics: [],
    studySessions: [],
    testSessions: [],
    mistakes: [],
    reviews: [],
    dailyLogs: [],
    achievements: [],
    meta:{
      comebackCount:0,
      nightSaveCount:0,
      lastBehindHours:0
    }
  };
}

let DB = loadDB();

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return defaultDB();
    const parsed = JSON.parse(raw);
    // merge missing fields for forward-compatibility
    const def = defaultDB();
    return Object.assign(def, parsed, {
      user: Object.assign(def.user, parsed.user||{}),
      meta: Object.assign(def.meta, parsed.meta||{})
    });
  }catch(e){ return defaultDB(); }
}

function saveDB(){
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

/* ================== UTILITIES ================== */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function todayStr(d=new Date()){
  return d.toISOString().slice(0,10);
}

function addDays(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+days);
  return todayStr(d);
}

function daysBetween(dateA, dateB){
  const a = new Date(dateA), b = new Date(dateB);
  return Math.round((b-a)/(1000*60*60*24));
}

function daysToExam(){
  if(!DB.user.examDate) return 365;
  const d = daysBetween(todayStr(), DB.user.examDate);
  return d;
}

function getCurrentPhase(){
  const d = daysToExam();
  for(const p of PHASES){ if(d >= p.minDays) return p; }
  return PHASES[PHASES.length-1];
}

function toast(msg, type="info"){
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.getElementById("toastContainer").appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),300); }, 3200);
}

function openModal(html){
  document.getElementById("modalBox").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("show");
}
function closeModal(){
  document.getElementById("modalOverlay").classList.remove("show");
}
document.getElementById("modalOverlay").addEventListener("click", e=>{
  if(e.target.id === "modalOverlay") closeModal();
});

function subjectName(id){
  const s = DB.subjects.find(x=>x.id===id);
  return s ? s.name : "-";
}
function subjectColor(id){
  const s = DB.subjects.find(x=>x.id===id);
  return s ? s.color : "#8a95a5";
}

/* ================== CORE: STUDY VALUE ================== */
function computeStudyValue(durationMin, activityType, focusScore){
  const weight = ACTIVITY_WEIGHTS[activityType] || 1;
  return (durationMin/60) * weight * focusScore;
}

/* ================== CORE: ADD STUDY SESSION ================== */
function addStudySession(data){
  const session = {
    id: uid(),
    userId:"u1",
    subjectId: data.subjectId,
    topicId: data.topicId || null,
    topicName: data.topicName || "",
    activityType: data.activityType,
    durationMinutes: Number(data.durationMinutes),
    focusScore: Number(data.focusScore),
    energyScore: Number(data.energyScore),
    testsCount: Number(data.testsCount)||0,
    notes: data.notes || "",
    createdAt: new Date().toISOString(),
    date: todayStr()
  };
  session.value = computeStudyValue(session.durationMinutes, session.activityType, session.focusScore);
  DB.studySessions.push(session);

  // auto-generate spaced repetition reviews if it's a "study" type activity (not itself a review)
  if(["مطالعه مفهومی","خلاصه‌نویسی","ویدیو"].includes(session.activityType) && session.topicName){
    generateReviewsForTopic(session.subjectId, session.topicName);
  }
  saveDB();
  return session;
}

/* ================== CORE: SPACED REPETITION GENERATION ================== */
function generateReviewsForTopic(subjectId, topicName){
  // avoid duplicate scheduling for same topic+subject if already has pending reviews
  const exists = DB.reviews.some(r => r.subjectId===subjectId && r.topicName===topicName && r.status==="pending");
  if(exists) return;

  REVIEW_SCHEDULE.forEach(sch=>{
    DB.reviews.push({
      id: uid(),
      userId:"u1",
      subjectId,
      topicName,
      reviewType: sch.type,
      scheduledDate: addDays(todayStr(), sch.days),
      completedDate: null,
      status: "pending",
      intervalNumber: sch.n
    });
  });
}

function completeReview(reviewId, success=true){
  const r = DB.reviews.find(x=>x.id===reviewId);
  if(!r) return;
  r.status = "done";
  r.completedDate = todayStr();
  saveDB();
  toast("مرور با موفقیت ثبت شد ✅");
  checkBadges();
}

function getDueReviewsToday(){
  const t = todayStr();
  return DB.reviews.filter(r => r.status==="pending" && r.scheduledDate <= t)
    .sort((a,b)=> a.scheduledDate.localeCompare(b.scheduledDate));
}

/* ================== CORE: TEST SESSION ================== */
function addTestSession(data){
  const total = Number(data.totalQuestions);
  const correct = Number(data.correct);
  const wrong = Number(data.wrong);
  const empty = total - correct - wrong;
  const session = {
    id: uid(),
    userId:"u1",
    subjectId: data.subjectId,
    topicName: data.topicName || "",
    testType: data.testType,
    totalQuestions: total,
    correct, wrong,
    empty: empty>0?empty:0,
    percent: total>0 ? Math.round((correct/total)*100) : 0,
    durationMinutes: Number(data.durationMinutes)||0,
    createdAt: new Date().toISOString(),
    date: todayStr()
  };
  DB.testSessions.push(session);
  saveDB();
  return session;
}

function addMistake(data){
  const m = {
    id: uid(),
    testSessionId: data.testSessionId || null,
    subjectId: data.subjectId,
    topicName: data.topicName || "",
    reason: data.reason,
    note: data.note || "",
    importance: data.importance || "متوسط",
    nextReviewDate: addDays(todayStr(),1),
    resolved:false,
    createdAt: new Date().toISOString()
  };
  DB.mistakes.push(m);
  // feed into review system too
  if(m.topicName) generateReviewsForTopic(m.subjectId, m.topicName);
  saveDB();
  return m;
}

/* ================== CORE: DAILY SCORE ================== */
function getSessionsForDate(dateStr){
  return DB.studySessions.filter(s=>s.date===dateStr);
}
function getTestsForDate(dateStr){
  return DB.testSessions.filter(s=>s.date===dateStr);
}
function getReviewsCompletedForDate(dateStr){
  return DB.reviews.filter(r=>r.completedDate===dateStr);
}

function computeDailyScore(dateStr){
  const sessions = getSessionsForDate(dateStr);
  const tests = getTestsForDate(dateStr);
  const reviewsDone = getReviewsCompletedForDate(dateStr);

  const effectiveHours = sessions.reduce((sum,s)=>sum + (s.durationMinutes/60)*(ACTIVITY_WEIGHTS[s.activityType]||1),0);
  const testCount = tests.reduce((sum,t)=>sum+t.totalQuestions,0) + sessions.reduce((sum,s)=>sum+(s.testsCount||0),0);
  const reviewCount = reviewsDone.length;
  const avgFocus = sessions.length ? sessions.reduce((sum,s)=>sum+s.focusScore,0)/sessions.length : 0;

  // penalty for overdue (pending) reviews scheduled before today and not done
  const overdue = DB.reviews.filter(r=>r.status==="pending" && r.scheduledDate < dateStr).length;
  const penalty = overdue * 2;

  const score = (effectiveHours*10) + (testCount*0.5) + (reviewCount*5) + (avgFocus*5) - penalty;
  return {
    score: Math.max(0, Math.round(score*10)/10),
    effectiveHours: Math.round(effectiveHours*100)/100,
    testCount, reviewCount, avgFocus: Math.round(avgFocus*10)/10, overdue
  };
}

/* ================== CORE: STREAK ================== */
function computeStreak(){
  let streak = 0;
  let d = todayStr();
  // if today has no sessions yet, start checking from yesterday for current streak baseline
  while(true){
    const has = getSessionsForDate(d).length > 0;
    if(!has){
      if(d === todayStr()){ d = addDays(d,-1); continue; } // allow today to be empty so far
      break;
    }
    streak++;
    d = addDays(d,-1);
  }
  return streak;
}

function computeMaxStreak(){
  // compute the longest historical streak across all study dates
  const dates = [...new Set(DB.studySessions.map(s=>s.date))].sort();
  if(dates.length===0) return 0;
  let max=1, cur=1;
  for(let i=1;i<dates.length;i++){
    if(daysBetween(dates[i-1],dates[i])===1){ cur++; max=Math.max(max,cur); }
    else cur=1;
  }
  return max;
}

/* ================== CORE: LEVEL & XP ================== */
function totalXP(){
  return DB.studySessions.reduce((s,x)=>s+x.value*10,0) + DB.testSessions.reduce((s,x)=>s+x.totalQuestions*0.5,0) + DB.reviews.filter(r=>r.status==="done").length*5;
}
function getLevel(){
  const xp = totalXP();
  let current = LEVELS[0];
  let next = LEVELS[1];
  for(let i=0;i<LEVELS.length;i++){
    if(xp >= LEVELS[i].min){ current = LEVELS[i]; next = LEVELS[i+1] || null; }
  }
  return {current, next, xp};
}

/* ================== CORE: BADGES ================== */
function checkBadges(){
  const data = {
    maxStreak: computeMaxStreak(),
    totalTests: DB.testSessions.reduce((s,x)=>s+x.totalQuestions,0),
    comebackCount: DB.meta.comebackCount,
    totalMistakes: DB.mistakes.length,
    nightSaveCount: DB.meta.nightSaveCount,
    completedReviews: DB.reviews.filter(r=>r.status==="done").length
  };
  BADGE_DEFS.forEach(b=>{
    const already = DB.achievements.some(a=>a.type===b.id);
    if(!already && b.check(data)){
      DB.achievements.push({id:uid(), userId:"u1", type:b.id, title:b.title, description:b.desc, unlockedAt:new Date().toISOString()});
      toast("🏆 نشان جدید گرفتی: " + b.title);
    }
  });
  saveDB();
}

/* ================== CORE: YESTERDAY COMPARISON ================== */
function compareWithYesterday(){
  const today = computeDailyScore(todayStr());
  const yesterday = computeDailyScore(addDays(todayStr(),-1));
  const diff = Math.round((today.score - yesterday.score)*10)/10;
  return {today, yesterday, diff};
}

/* ================== CORE: DAILY LOG (wellness) ================== */
function upsertDailyLog(data){
  let log = DB.dailyLogs.find(l=>l.date===todayStr());
  if(!log){
    log = {id:uid(), userId:"u1", date:todayStr()};
    DB.dailyLogs.push(log);
  }
  Object.assign(log, data);
  log.dailyScore = computeDailyScore(todayStr()).score;
  saveDB();
  return log;
}

function getRecentLogs(n=7){
  return DB.dailyLogs.slice(-n);
}

function checkFatigueWarning(){
  const logs = getRecentLogs(3);
  if(logs.length < 2) return null;
  const lowSleep = logs.filter(l=>l.sleepHours < 6).length;
  const lowScore = logs.filter(l=>l.dailyScore < 30).length;
  if(lowSleep >= 2 && lowScore >= 2){
    return "عملکرد تو افت کرده. امروز برنامه سبک‌تر انجام بده و یک استراحت واقعی داشته باش.";
  }
  return null;
}

/* ================== BACKLOG ALGORITHM ================== */
// محاسبه عقب‌ماندگی: مقایسه ساعات هدف روزانه با ساعات واقعی مطالعه‌شده در ۷ روز گذشته
function computeBacklog(){
  const target = DB.user.targetDailyHours;
  let deficit = 0;
  for(let i=1;i<=7;i++){
    const d = addDays(todayStr(), -i);
    const done = getSessionsForDate(d).reduce((s,x)=>s+x.durationMinutes/60,0);
    if(done < target) deficit += (target - done);
  }
  return Math.round(deficit*10)/10;
}

// توزیع ساعات عقب‌افتاده در ۵ روز آینده
function distributeBacklog(){
  const backlog = computeBacklog();
  if(backlog <= 0) return null;
  const perDay = Math.round((backlog/5)*10)/10;
  const days = [];
  for(let i=0;i<5;i++){
    days.push({date: addDays(todayStr(), i), extraHours: perDay});
  }
  return {totalBacklog: backlog, perDayExtra: perDay, days};
}

      <button class="btn-primary" onclick="saveMistakeFromModal('${session.id}','${session.subjectId}','${session.topicName}')">ثبت و بستن</button>
      <button class="btn-ghost" onclick="closeModal();renderTestLog()">فعلاً رد کن</button>
    </div>
  `);
}

function saveMistakeFromModal(testSessionId, subjectId, topicName){
  const reason = document.getElementById("mReason").value;
  const importance = document.getElementById("mImportance").value;
  const note = document.getElementById("mNote").value.trim();
  addMistake({testSessionId, subjectId, topicName, reason, note, importance});
  closeModal();
  toast("در دفترچه غلط‌ها ثبت شد 📓");
  checkBadges();
  renderTestLog();
}

/* ================== PLANNER PAGE ================== */
function renderPlanner(){
  const el = document.getElementById("pageContent");
  const phase = getCurrentPhase();
  const dte = daysToExam();
  const backlogInfo = distributeBacklog();
  const target = DB.user.targetDailyHours;
  const studyHrs = Math.round(target*phase.ratio.study*10)/10;
  const testHrs = Math.round(target*phase.ratio.test*10)/10;
  const reviewHrs = Math.round(target*phase.ratio.review*10)/10;
  const dueReviews = getDueReviewsToday();

  el.innerHTML = `
    <div class="page-header">
      <h2>برنامه‌ریز هوشمند</h2>
      <p class="muted">${phase.name} — ${dte >= 0 ? dte : 0} روز تا آزمون</p>
    </div>

    <div class="card">
      <h3>توزیع پیشنهادی ساعات امروز (کل: ${target} ساعت)</h3>
      <div class="ratio-bar">
        <div class="ratio-seg study" style="width:${phase.ratio.study*100}%">مطالعه ${studyHrs}h</div>
        <div class="ratio-seg test" style="width:${phase.ratio.test*100}%">تست ${testHrs}h</div>
        <div class="ratio-seg review" style="width:${phase.ratio.review*100}%">مرور ${reviewHrs}h</div>
      </div>
      <p class="muted small">قانون: مرور بر مطالعه جدید اولویت دارد. ابتدا مرورهای عقب‌افتاده رو انجام بده.</p>
    </div>

    ${backlogInfo ? `
    <div class="card backlog-plan">
      <h3>⚠️ برنامه جبران عقب‌ماندگی</h3>
      <p>مجموع عقب‌ماندگی: <b>${backlogInfo.totalBacklog} ساعت</b></p>
      <table class="data-table">
        <thead><tr><th>روز</th><th>ساعت اضافه پیشنهادی</th></tr></thead>
        <tbody>
          ${backlogInfo.days.map(d=>`<tr><td>${d.date}</td><td>+${d.perDayExtra||d.extraHours} ساعت</td></tr>`).join("")}
        </tbody>
      </table>
    </div>` : `<div class="card ok"><h3>✅ عقب‌ماندگی نداری، برنامه‌ات رو به‌موقع پیش می‌بری</h3></div>`}

    <div class="card">
      <h3>اولویت امروز — مرورهای سررسید (${dueReviews.length})</h3>
      <ul class="review-list">
        ${dueReviews.map(r=>`
          <li>
            <span>${r.topicName} <small class="muted">(${subjectName(r.subjectId)} — ${r.reviewType})</small></span>
            <button class="btn-sm" onclick="completeReview('${r.id}');renderPlanner()">انجام شد</button>
          </li>`).join("") || `<li class="muted">موردی نیست</li>`}
      </ul>
    </div>

    <div class="card">
      <h3>تنظیم هدف ساعت روزانه</h3>
      <div class="form-row inline">
        <input type="number" id="plTarget" min="1" max="16" step="0.5" value="${target}">
        <button class="btn-primary" onclick="updateTargetHours()">به‌روزرسانی</button>
      </div>
    </div>
  `;
}

function updateTargetHours(){
  const v = Number(document.getElementById("plTarget").value);
  if(v > 0){
    DB.user.targetDailyHours = v;
    saveDB();
    toast("هدف روزانه به‌روز شد");
    renderPlanner();
  }
}

/* ================== UTILS (در صورت نبودن در بخش‌های قبل) ================== */
if(typeof toast !== "function"){
  window.toast = function(msg, duration=2500){
    let box = document.getElementById("toastBox");
    if(!box){
      box = document.createElement("div");
      box.id = "toastBox";
      box.className = "toast-box";
      document.body.appendChild(box);
    }
    const t = document.createElement("div");
    t.className = "toast-item";
    t.textContent = msg;
    box.appendChild(t);
    setTimeout(()=> t.classList.add("show"), 10);
    setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),300); }, duration);
  };
}

if(typeof openModal !== "function"){
  window.openModal = function(html){
    let overlay = document.getElementById("modalOverlay");
    if(!overlay){
      overlay = document.createElement("div");
      overlay.id = "modalOverlay";
      overlay.className = "modal-overlay";
      overlay.innerHTML = `<div class="modal-box" id="modalBox"></div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener("click", e=>{ if(e.target===overlay) closeModal(); });
    }
    document.getElementById("modalBox").innerHTML = html;
    overlay.classList.add("open");
  };
  window.closeModal = function(){
    const overlay = document.getElementById("modalOverlay");
    if(overlay) overlay.classList.remove("open");
  };
}

/* ================== MISTAKES BOOK PAGE ================== */
let mistakeFilter = {subjectId:"all", reason:"all", status:"all"};

function renderMistakesBook(){
  const el = document.getElementById("pageContent");
  let list = [...DB.mistakes].sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));

  if(mistakeFilter.subjectId !== "all") list = list.filter(m=>m.subjectId===mistakeFilter.subjectId);
  if(mistakeFilter.reason !== "all") list = list.filter(m=>m.reason===mistakeFilter.reason);
  if(mistakeFilter.status !== "all") list = list.filter(m=> mistakeFilter.status==="resolved" ? m.resolved : !m.resolved);

  // آمار علت‌ها برای تحلیل
  const reasonStats = {};
  DB.mistakes.forEach(m=>{ reasonStats[m.reason] = (reasonStats[m.reason]||0)+1; });
  const topReason = Object.entries(reasonStats).sort((a,b)=>b[1]-a[1])[0];

  el.innerHTML = `
    <div class="page-header">
      <h2>دفترچه غلط‌ها</h2>
      <p class="muted">${DB.mistakes.length} مورد ثبت‌شده${topReason ? ` — بیشترین علت: ${topReason[0]} (${topReason[1]} مورد)`:""}</p>
    </div>

    <div class="card filter-bar">
      <select id="mfSubject">
        <option value="all">همه دروس</option>
        ${DB.subjects.map(s=>`<option value="${s.id}" ${mistakeFilter.subjectId===s.id?"selected":""}>${s.name}</option>`).join("")}
      </select>
      <select id="mfReason">
        <option value="all">همه علت‌ها</option>
        ${MISTAKE_REASONS.map(r=>`<option value="${r}" ${mistakeFilter.reason===r?"selected":""}>${r}</option>`).join("")}
      </select>
      <select id="mfStatus">
        <option value="all" ${mistakeFilter.status==="all"?"selected":""}>همه وضعیت‌ها</option>
        <option value="open" ${mistakeFilter.status==="open"?"selected":""}>باز</option>
        <option value="resolved" ${mistakeFilter.status==="resolved"?"selected":""}>حل‌شده</option>
      </select>
      <button class="btn-sm" onclick="applyMistakeFilter()">اعمال فیلتر</button>
    </div>

    <div class="card chart-card">
      <h3>توزیع علت غلط‌ها</h3>
      <canvas id="reasonChart" height="80"></canvas>
    </div>

    <div class="mistake-list">
      ${list.map(m=>`
        <div class="card mistake-item ${m.resolved?'resolved':''}">
          <div class="mistake-top">
            <span class="dot" style="background:${subjectColor(m.subjectId)}"></span>
            <b>${subjectName(m.subjectId)}</b>
            <span class="muted">— ${m.topicName||"بدون عنوان"}</span>
            <span class="badge-tag ${m.importance==='بالا'?'high':m.importance==='متوسط'?'mid':'low'}">${m.importance}</span>
          </div>
          <p class="mistake-reason">علت: <b>${m.reason}</b></p>
          ${m.note ? `<p class="muted">${m.note}</p>` : ""}
          <div class="mistake-actions">
            <span class="muted small">${new Date(m.createdAt).toLocaleDateString("fa-IR")}</span>
            ${m.resolved
              ? `<span class="resolved-tag">✅ حل‌شده</span>`
              : `<button class="btn-sm" onclick="resolveMistake('${m.id}')">علامت به‌عنوان حل‌شده</button>`}
            <button class="btn-sm danger" onclick="deleteMistake('${m.id}')">حذف</button>
          </div>
        </div>
      `).join("") || `<div class="card muted">موردی با این فیلتر یافت نشد</div>`}
    </div>
  `;

  drawReasonChart(reasonStats);
}

function applyMistakeFilter(){
  mistakeFilter.subjectId = document.getElementById("mfSubject").value;
  mistakeFilter.reason = document.getElementById("mfReason").value;
  mistakeFilter.status = document.getElementById("mfStatus").value;
  renderMistakesBook();
}

function resolveMistake(id){
  const m = DB.mistakes.find(x=>x.id===id);
  if(m){ m.resolved = true; m.resolvedAt = new Date().toISOString(); saveDB(); checkBadges(); }
  renderMistakesBook();
}

function deleteMistake(id){
  DB.mistakes = DB.mistakes.filter(x=>x.id!==id);
  saveDB();
  renderMistakesBook();
}

function drawReasonChart(stats){
  const ctx = document.getElementById("reasonChart");
  if(!ctx) return;
  const labels = Object.keys(stats);
  const data = Object.values(stats);
  if(window._reasonChartInst) window._reasonChartInst.destroy();
  if(!labels.length) return;
  window._reasonChartInst = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets:[{ data, backgroundColor:"#0e8a6d" }] },
    options: { plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, ticks:{stepSize:1} } } }
  });
}

    <div class="card">
      <h3>🟢 آینده</h3>
      <table class="data-table">
        <thead><tr><th>تاریخ</th><th>درس</th><th>موضوع</th><th>مرحله</th></tr></thead>
        <tbody>
          ${upcoming.map(r=>`
            <tr>
              <td>${r.dueDate}</td>

            </tr>`).join("") || `<tr><td colspan="4" class="muted">موردی نیست</td></tr>`}
        </tbody>

    </div>

          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

        <button class="btn-danger" onclick="confirmResetAll()">🗑 پاک‌سازی کامل</button>
      </div>
    </div>

    <div class="card">
      <h3>درباره</h3>
      <p class="muted">اپلیکیشن برنامه‌ریز آزمون تخصص — نسخه MVP. تمامی داده‌ها فقط در مرورگر شما ذخیره می‌شوند.</p>

function saveProfileSettings(){
  DB.user.name = document.getElementById("setName").value.trim() || DB.user.name;
  DB.user.examDate = document.getElementById("setExamDate").value || DB.user.examDate;
  DB.user.targetDailyHours = Number(document.getElementById("setTarget").value) || DB.user.targetDailyHours;
  saveDB();
  toast("تنظیمات ذخیره شد");
  renderSettings();
}

function addSubject(){
  const name = document.getElementById("newSubjectName").value.trim();
  const color = document.getElementById("newSubjectColor").value;
  if(!name){ toast("نام درس رو وارد کن"); return; }
  DB.subjects.push({ id: uid(), name, color });
  saveDB();
  renderSettings();
}

function renameSubject(id, name){
  const s = DB.subjects.find(x=>x.id===id);
  if(s){ s.name = name.trim() || s.name; saveDB(); }
}

function recolorSubject(id, color){
  const s = DB.subjects.find(x=>x.id===id);
  if(s){ s.color = color; saveDB(); }
}

function removeSubject(id){
  const inUse = DB.studySessions.some(s=>s.subjectId===id) || DB.testSessions.some(t=>t.subjectId===id);
  if(inUse){
    toast("این درس سابقه ثبت‌شده داره، قابل حذف نیست");
    return;
  }
  DB.subjects = DB.subjects.filter(s=>s.id!==id);
  saveDB();
  renderSettings();
}

function exportData(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `exam-planner-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("فایل پشتیبان دانلود شد");
}

function importData(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const parsed = JSON.parse(e.target.result);
      DB = parsed;
      saveDB();
      toast("اطلاعات با موفقیت بارگذاری شد");
      render();
    }catch(err){
      toast("فایل نامعتبر است");
    }
  };
  reader.readAsText(file);
}

function confirmResetAll(){
  openModal(`
    <h3>⚠️ پاک‌سازی کامل</h3>
    <p>تمام داده‌های ذخیره‌شده (جلسات مطالعه، تست‌ها، غلط‌ها، مرورها و نشان‌ها) حذف خواهند شد. این عمل قابل بازگشت نیست.</p>
    <p class="muted">پیشنهاد می‌شود قبل از این کار یک خروجی JSON بگیرید.</p>
    <div class="modal-actions">
      <button class="btn-danger" onclick="resetAllData()">بله، همه‌چیز پاک شود</button>
      <button class="btn-ghost" onclick="closeModal()">انصراف</button>
    </div>
  `);
}

function resetAllData(){
  localStorage.removeItem(DB_KEY);
  location.reload();
}
